name: CI

on: 
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build: 

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: [3.9]

    steps:
    - uses: actions/checkout@v2

    - name: Setup Python
      uses: actions/setup-python@v2
      with:
        python-version: ${{ matrix.python }}
    
    - name: Install Dependencies
      run: |
        pip install cookiecutter
    - name: Setup CookieCutter
      run: |
        cookiecutter . --no-input
